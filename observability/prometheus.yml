global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: 'payments-api'
    static_configs:
      - targets: ['payments-api:8000']
    metrics_path: '/metrics'

  - job_name: 'ledger-service'
    static_configs:
      - targets: ['ledger-service:8001']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
