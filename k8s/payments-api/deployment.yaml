apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  labels:
    app: payments-api
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payments-api
      version: stable
  template:
    metadata:
      labels:
        app: payments-api
        version: stable
    spec:
      automountServiceAccountToken: false
      containers:
      - name: payments-api
        image: ghcr.io/bshongwe/payments-api:v1.0.0
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            ephemeral-storage: "2Gi"
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8000
          name: metrics
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: api-key
        - name: LEDGER_URL
          value: "http://ledger-service:8001"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  labels:
    app: payments-api
spec:
  selector:
    app: payments-api
  ports:
  - port: 8000
    targetPort: 8000
    name: http
