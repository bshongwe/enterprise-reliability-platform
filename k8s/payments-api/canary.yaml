apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-canary
  labels:
    app: payments-api
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
      version: canary
  template:
    metadata:
      labels:
        app: payments-api
        version: canary
    spec:
      containers:
      - name: payments-api
        image: ghcr.io/your-org/payments-api:canary
        ports:
        - containerPort: 8000
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: api-key
        - name: LEDGER_URL
          value: "http://ledger-service:8001"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
