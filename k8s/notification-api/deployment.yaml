apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  labels:
    app: notification-api
    version: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-api
      version: stable
  template:
    metadata:
      labels:
        app: notification-api
        version: stable
    spec:
      automountServiceAccountToken: false
      containers:
      - name: notification-api
        image: ghcr.io/bshongwe/notification-api:v1.0.0
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
            ephemeral-storage: "512Mi"
          limits:
            memory: "256Mi"
            ephemeral-storage: "1Gi"
        ports:
        - containerPort: 8002
          name: http
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: api-key
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  labels:
    app: notification-api
spec:
  selector:
    app: notification-api
  ports:
  - port: 8002
    targetPort: 8002
    name: http
