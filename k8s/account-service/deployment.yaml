apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  labels:
    app: account-service
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: account-service
      version: stable
  template:
    metadata:
      labels:
        app: account-service
        version: stable
    spec:
      automountServiceAccountToken: false
      containers:
      - name: account-service
        image: ghcr.io/bshongwe/account-service:v1.0.0
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
            ephemeral-storage: "1Gi"
          limits:
            memory: "512Mi"
            ephemeral-storage: "2Gi"
        ports:
        - containerPort: 8002
          name: http
        - containerPort: 8002
          name: metrics
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: api-key
        - name: ACCOUNT_DB_URL
          value: "sqlite:///./accounts.db"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  labels:
    app: account-service
spec:
  selector:
    app: account-service
  ports:
  - port: 8002
    targetPort: 8002
    name: http
