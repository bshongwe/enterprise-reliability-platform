name: CD - GitOps Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - payments-api
          - ledger-service
          - account-service
      deployment_type:
        description: 'Deployment type'
        required: true
        type: choice
        options:
          - canary
          - production

jobs:
  check-error-budget:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.budget_check.outputs.can_deploy }}
    steps:
      - name: Check Error Budget
        id: budget_check
        env:
          PROM_URL: ${{ secrets.PROMETHEUS_URL }}
          SERVICE: ${{ github.event.inputs.service || 'payments' }}
        run: |
          QUERY="1 - (sum(rate(http_requests_total{service=\"${SERVICE}\",status=\"success\"}[1h])) / sum(rate(http_requests_total{service=\"${SERVICE}\"}[1h])))"
          
          BURN_RATE=$(curl -s "${PROM_URL}/api/v1/query?query=${QUERY}" | jq -r '.data.result[0].value[1]')
          
          if (( $(echo "$BURN_RATE > 0.00072" | bc -l) )); then
            echo "can_deploy=false" >> $GITHUB_OUTPUT
            echo "::error::Deployment blocked - burning >50% error budget"
            exit 1
          fi
          
          echo "can_deploy=true" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-error-budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [payments-api, ledger-service, account-service]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if service changed
        id: check
        env:
          SERVICE: ${{ matrix.service }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ github.event.inputs.service }}
        run: |
          SERVICE_DIR=$(echo $SERVICE | tr '-' '_')
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger - only build selected service
            if [ "$SERVICE" = "$INPUT_SERVICE" ]; then
              echo "build=true" >> $GITHUB_OUTPUT
              echo "✅ Building $SERVICE (manual trigger)"
            else
              echo "build=false" >> $GITHUB_OUTPUT
              echo "⏭️ Skipping $SERVICE (not selected)"
            fi
          else
            # Auto trigger - check if service files changed
            CHANGED=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED" | grep -q "services/${SERVICE_DIR}/"; then
              echo "build=true" >> $GITHUB_OUTPUT
              echo "✅ Building $SERVICE (files changed)"
            else
              echo "build=false" >> $GITHUB_OUTPUT
              echo "⏭️ Skipping $SERVICE (no changes)"
            fi
          fi

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.build == 'true'
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE="ghcr.io/${REPO_OWNER}/${SERVICE}:${TAG}"
          
          # Convert service name to directory name
          SERVICE_DIR=$(echo $SERVICE | tr '-' '_')
          
          echo "Building Docker image: ${IMAGE}"
          docker build -t ${IMAGE} \
            -f services/${SERVICE_DIR}/Dockerfile .
          
          echo "Pushing image to GitHub Container Registry..."
          docker push ${IMAGE}
          
          echo "✅ Successfully pushed ${IMAGE}"
          echo "View at: https://github.com/${REPO}/pkgs/container/${SERVICE}"

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.detect.outputs.service }}
      deployment_type: ${{ steps.detect.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed service
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ github.event.inputs.service }}
          INPUT_TYPE: ${{ github.event.inputs.deployment_type }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SERVICE="$INPUT_SERVICE"
            TYPE="$INPUT_TYPE"
          else
            # Auto-detect service from changed files
            CHANGED=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED" | grep -q "services/payments_api/"; then
              SERVICE="payments-api"
            elif echo "$CHANGED" | grep -q "services/ledger_service/"; then
              SERVICE="ledger-service"
            elif echo "$CHANGED" | grep -q "services/account_service/"; then
              SERVICE="account-service"
            else
              SERVICE=""
            fi
            TYPE="production"
          fi
          
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "Detected service: $SERVICE, type: $TYPE"

      - name: Update image tag
        if: steps.detect.outputs.service != ''
        env:
          SERVICE: ${{ steps.detect.outputs.service }}
          TYPE: ${{ steps.detect.outputs.type }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$TYPE" = "canary" ]; then
            FILE="k8s/${SERVICE}/canary.yaml"
            TAG="canary-${SHA}"
            sed -i "s|image: ghcr.io/bshongwe/${SERVICE}:canary|image: ghcr.io/bshongwe/${SERVICE}:${TAG}|" $FILE
          else
            FILE="k8s/${SERVICE}/deployment.yaml"
            TAG="${SHA}"
            sed -i "s|image: ghcr.io/bshongwe/${SERVICE}:v.*|image: ghcr.io/bshongwe/${SERVICE}:${TAG}|" $FILE
          fi

      - name: Commit and push
        if: steps.detect.outputs.service != ''
        env:
          SERVICE: ${{ steps.detect.outputs.service }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/
          git commit -m "Deploy ${SERVICE} - ${SHA}" || echo "No changes"
          git push || echo "Nothing to push"

  monitor-canary:
    needs: update-manifests
    if: needs.update-manifests.outputs.deployment_type == 'canary'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for canary deployment
        run: sleep 300

      - name: Check canary health
        id: health_check
        env:
          SERVICE: ${{ needs.update-manifests.outputs.service }}
          PROM_URL: ${{ secrets.PROMETHEUS_URL }}
        run: |
          ERROR_RATE=$(curl -s "${PROM_URL}/api/v1/query?query=sum(rate(http_requests_total{service=\"${SERVICE}\",version=\"canary\",status=\"error\"}[5m]))/sum(rate(http_requests_total{service=\"${SERVICE}\",version=\"canary\"}[5m]))" | jq -r '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "::error::Canary failed - error rate ${ERROR_RATE}"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          git revert HEAD --no-edit
          git push
