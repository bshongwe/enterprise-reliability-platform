name: CD - GitOps Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - payments-api
          - ledger-service
      deployment_type:
        description: 'Deployment type'
        required: true
        type: choice
        options:
          - canary
          - production

jobs:
  check-error-budget:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.budget_check.outputs.can_deploy }}
    steps:
      - name: Check Error Budget
        id: budget_check
        run: |
          PROM_URL="${{ secrets.PROMETHEUS_URL }}"
          SERVICE="${{ github.event.inputs.service || 'payments' }}"
          
          QUERY="1 - (sum(rate(http_requests_total{service=\"${SERVICE}\",status=\"success\"}[1h])) / sum(rate(http_requests_total{service=\"${SERVICE}\"}[1h])))"
          
          BURN_RATE=$(curl -s "${PROM_URL}/api/v1/query?query=${QUERY}" | jq -r '.data.result[0].value[1]')
          
          if (( $(echo "$BURN_RATE > 0.00072" | bc -l) )); then
            echo "can_deploy=false" >> $GITHUB_OUTPUT
            echo "::error::Deployment blocked - burning >50% error budget"
            exit 1
          fi
          
          echo "can_deploy=true" >> $GITHUB_OUTPUT

  build-and-push:
    needs: check-error-budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed service
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED" | grep -q "services/payments_api/"; then
              SERVICE="payments-api"
            elif echo "$CHANGED" | grep -q "services/ledger_service/"; then
              SERVICE="ledger-service"
            else
              SERVICE=""
            fi
          fi
          
          if [ -n "$SERVICE" ]; then
            echo "service=$SERVICE" >> $GITHUB_OUTPUT
            echo "✅ Detected service to build: $SERVICE"
          else
            echo "service=" >> $GITHUB_OUTPUT
            echo "ℹ️ No service changes detected, skipping build"
          fi

      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.service != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.detect.outputs.service != ''
        run: |
          SERVICE="${{ steps.detect.outputs.service }}"
          TAG="${{ github.sha }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${SERVICE}:${TAG}"
          
          # Convert service name to directory name
          SERVICE_DIR=$(echo $SERVICE | tr '-' '_')
          
          echo "Building Docker image: ${IMAGE}"
          docker build -t ${IMAGE} \
            -f services/${SERVICE_DIR}/Dockerfile .
          
          echo "Pushing image to GitHub Container Registry..."
          docker push ${IMAGE}
          
          echo "✅ Successfully pushed ${IMAGE}"
          echo "View at: https://github.com/${{ github.repository }}/pkgs/container/${SERVICE}"

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed service
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            TYPE="${{ github.event.inputs.deployment_type }}"
          else
            # Auto-detect service from changed files
            CHANGED=$(git diff --name-only HEAD^ HEAD)
            if echo "$CHANGED" | grep -q "services/payments_api/"; then
              SERVICE="payments-api"
            elif echo "$CHANGED" | grep -q "services/ledger_service/"; then
              SERVICE="ledger-service"
            else
              SERVICE=""
            fi
            TYPE="production"
          fi
          
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "Detected service: $SERVICE, type: $TYPE"

      - name: Update image tag
        if: steps.detect.outputs.service != ''
        run: |
          SERVICE="${{ steps.detect.outputs.service }}"
          TYPE="${{ steps.detect.outputs.type }}"
          
          if [ "$TYPE" = "canary" ]; then
            FILE="k8s/${SERVICE}/canary.yaml"
            TAG="canary-${{ github.sha }}"
            sed -i "s|image: ghcr.io/bshongwe/${SERVICE}:canary|image: ghcr.io/bshongwe/${SERVICE}:${TAG}|" $FILE
          else
            FILE="k8s/${SERVICE}/deployment.yaml"
            TAG="${{ github.sha }}"
            sed -i "s|image: ghcr.io/bshongwe/${SERVICE}:v.*|image: ghcr.io/bshongwe/${SERVICE}:${TAG}|" $FILE
          fi

      - name: Commit and push
        if: steps.detect.outputs.service != ''
        run: |
          SERVICE="${{ steps.detect.outputs.service }}"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/
          git commit -m "Deploy ${SERVICE} - ${{ github.sha }}" || echo "No changes"
          git push || echo "Nothing to push"

  monitor-canary:
    needs: update-manifests
    if: github.event.inputs.deployment_type == 'canary'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for canary deployment
        run: sleep 300

      - name: Check canary health
        id: health_check
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          PROM_URL="${{ secrets.PROMETHEUS_URL }}"
          
          ERROR_RATE=$(curl -s "${PROM_URL}/api/v1/query?query=sum(rate(http_requests_total{service=\"${SERVICE}\",version=\"canary\",status=\"error\"}[5m]))/sum(rate(http_requests_total{service=\"${SERVICE}\",version=\"canary\"}[5m]))" | jq -r '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "::error::Canary failed - error rate ${ERROR_RATE}"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          git revert HEAD --no-edit
          git push
